{
  "eval": "forbidden_artifacts",
  "description": "Fail if real application artifacts, live config, or obvious secret patterns appear in the template baseline.",
  "ignored_root_parts": [
    ".git",
    ".pytest_cache",
    "__pycache__",
    "local"
  ],
  "forbidden_path_globs": [
    ".github/workflows/**",
    "evals/**/*.py",
    "examples/**/*.cs",
    "examples/**/*.py",
    "examples/**/*.js",
    "examples/**/*.ts",
    "examples/**/*.ps1",
    "examples/**/*.sln",
    "examples/**/*.csproj",
    "examples/**/*.xaml",
    "profiles/**/*.cs",
    "profiles/**/*.csproj",
    "templates/**/*.cs",
    "templates/**/*.csproj",
    "**/.env",
    "**/*.env",
    "**/*live-config*",
    "**/*live_config*"
  ],
  "forbidden_suffixes": [
    ".sln",
    ".csproj",
    ".fsproj",
    ".vbproj",
    ".xaml",
    ".exe",
    ".dll",
    ".pfx",
    ".pem",
    ".key"
  ],
  "text_suffixes": [
    ".md",
    ".template",
    ".py",
    ".yml",
    ".yaml",
    ".txt"
  ]
}
