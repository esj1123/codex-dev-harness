{
  "name": "forbidden_secret_patterns",
  "eval": "forbidden_artifacts",
  "description": "Fail if obvious token, key, password, private key, or live-value patterns appear in safe text surfaces.",
  "ignored_root_parts": [
    ".git",
    ".pytest_cache",
    "__pycache__",
    "artifacts",
    "local"
  ],
  "forbidden_path_globs": [],
  "forbidden_suffixes": [
    ".pfx",
    ".pem",
    ".key"
  ],
  "text_suffixes": [
    ".md",
    ".template",
    ".py",
    ".yml",
    ".yaml",
    ".txt"
  ]
}
