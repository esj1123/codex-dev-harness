{
  "eval": "policy_phrases",
  "description": "Verify required safety, approval boundary, and NOT RUN honesty language.",
  "checks": [
    {
      "path": "AGENTS.md",
      "phrases": [
        "Default to read-only inspection first",
        "explicit confirmation",
        "Verification result",
        "No real application code"
      ]
    },
    {
      "path": "docs/SAFETY_POLICY.md",
      "phrases": [
        "Read-only inspection",
        "Dry-run or expected change summary",
        "Explicit confirmation for risky side effects",
        "Use synthetic fixtures and summaries instead of private raw input"
      ]
    },
    {
      "path": "examples/python_cli_minimal/STATUS.profile.md",
      "phrases": [
        "NOT RUN",
        "synthetic fixtures only"
      ]
    },
    {
      "path": "examples/csharp_desktop_minimal/STATUS.profile.md",
      "phrases": [
        "NOT RUN",
        "No solution or project files in skeleton",
        "No desktop runtime in skeleton"
      ]
    },
    {
      "path": "examples/plc_tool_minimal/SAFETY_POLICY.profile.md",
      "phrases": [
        "Simulator/mock first",
        "Live device write is prohibited",
        "Explicit approval is required",
        "Credentials, keys, or tokens"
      ]
    }
  ]
}
