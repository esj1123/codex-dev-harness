{
  "name": "render_structure_base_docs",
  "eval": "render_structure",
  "description": "Verify required base rendered docs exist for all minimal examples.",
  "match_mode": "contains",
  "forbidden_suffixes": [
    ".sln",
    ".csproj",
    ".fsproj",
    ".vbproj",
    ".xaml",
    ".cs",
    ".vb",
    ".fs",
    ".exe",
    ".dll"
  ],
  "examples": [
    {
      "name": "python_cli_minimal",
      "config": "examples/python_cli_minimal/template.config.yml",
      "target": "examples/python_cli_minimal",
      "expected_files": [
        "examples/python_cli_minimal/ACCEPTANCE_TRACE.md",
        "examples/python_cli_minimal/AGENTS.md",
        "examples/python_cli_minimal/APPROVALS.md",
        "examples/python_cli_minimal/DATA_SCOPE.md",
        "examples/python_cli_minimal/MVP.md",
        "examples/python_cli_minimal/PHASE_PLAN.md",
        "examples/python_cli_minimal/PRODUCT.md",
        "examples/python_cli_minimal/PROJECT_BOUNDARY.md",
        "examples/python_cli_minimal/README.md",
        "examples/python_cli_minimal/SOURCE_INDEX.md",
        "examples/python_cli_minimal/STATUS.md"
      ]
    },
    {
      "name": "csharp_desktop_minimal",
